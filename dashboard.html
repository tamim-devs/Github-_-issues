<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />  
    <!-- Daisy  UI + Tailwind CSS -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Bug Tracker</title>

</head>
<body class="bg-gray-100">
 <header>
    <nav>
        <div class="navbar bg-base-100 shadow-sm flex items-center justify-around">
  <div class="flex items-center gap-2">
    <div class="rounded-full w-10 h-10">
        <img src="assets/github-logo.png" alt="">
    </div>
    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2">
  <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input id="search" type="search" required placeholder="Search" />
</label>
    <div class="dropdown dropdown-end">
    <button class="btn btn-primary text-nowrap">+ New Issue</button>
      </div>
     
    </div>
  </div>
</div>
    </nav>  
  </header>
  <main class="mx-auto rounded-lg w-11/12 ">
   <div class="mt-14 rounded-lg bg-white py-3  mb-4">
  <div class="tabs tabs-boxed space-x-2 ml-2 ">
    <a  onclick="setActive(this); filterIssues('all')" id="all-tab"
      class="tab tab-active py-3 font-bold rounded outline  bg-violet-600 text-white 
     ">
      All
    </a>
     <a  onclick="setActive(this); filterIssues('open')" id="open-tab"
      class="tab tab-active py-3 font-bold rounded outline  bg-violet-600 text-white 
     ">
      Open
    </a>
     <a  onclick="setActive(this); filterIssues('closed')" id="closed-tab"
      class="tab tab-active py-3 font-bold rounded outline  bg-violet-600 text-white 
     ">
      Closed
    </a>
  </div>
  </div>



<!-- Track and manage  projects issues -->

  <div class="w-full bg-white rounded-xl px-6 py-4 flex items-center justify-between">
  
  <!-- Left Side -->
  <div class="flex items-center gap-3">
    
    <!-- Icon -->
    <div class="w-10 h-10 flex items-center justify-center bg-purple-100 text-purple-600 rounded-full">
      <!-- simple icon -->
      <img src="assets/Aperture.png" alt="">
    </div>

    <!-- Text -->
    <div>
<h2 id="issue-count" class="text-gray-800 font-semibold text-sm">0 Issues</h2>
      <p class="text-gray-500 text-xs">Track and manage your project issues</p>
    </div>

  </div>

  <!-- Right Side -->
  <div class="flex items-center gap-6 text-sm text-gray-600">

    <div class="flex items-center gap-2">
      <span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span>
      <span>Open</span>
    </div>

    <div class="flex items-center gap-2">
      <span class="w-2.5 h-2.5 bg-purple-500 rounded-full"></span>
      <span>Closed</span>
    </div>

  </div>

</div>

<div id="issues-container" class="grid md:grid-cols-3 sm:grid-cols-2 bg-white bottom-1 border-gray-400 gap-6 p-6 mt-8 rounded-xl">

</div>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
