<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Daisy  UI + Tailwind CSS -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Bug Tracker</title>
</head>
<body class="flex items-center  justify-center h-screen bg-base-200">
    
    <fieldset class="fieldset bg-white border-base-300 rounded-box w-xs border p-14">
       <div class="justify-center items-center space-y-6 flex flex-col">
       <div class="justify-center flex">
         <img src="assets/github-logo.png" alt="github-logo.png">
       </div>
        <h2 class="text-3xl text-nowrap mb-1 font-semibold">GitHub Issues Tracker</h2>
        <p class="text-xl text-gray-400 mb-1 ">Sign in to manage your issues</p>
       </div> 

       

  <label class="label text-black font-semibold">Username</label>
  <input id="username" type="email" class="input" placeholder="Enter Username" />
  <p class="text-primary font-bold text-xs">Default: admin</p>

  <label class="label text-black font-semibold">Password</label>
  <input id="password" type="password" class="input" placeholder="Enter Password" />
<p class="text-primary font-bold text-xs">Default: admin123</p>


  <button onclick="login()" class="btn btn-primary mt-4 mb-6">Login</button>

 <div class="divider mb-2">OR</div>
<p class="text-center text-gray-400 text-sm">Demo Credentials:</p>
<div class="py-6 flex flex-col items-center justify-center bg-[#64748b0c]">
<p class="text-base text-gray-400"><span class="font-bold text-base text-black">Username:</span> admin</p>
<p class="text-base text-gray-400"><span class="font-bold text-base text-black">Password:</span> admin123</p>
</div>
</fieldset>

<script src="js/app.js"></script>
</body>
</html>
